<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>LuxStore — Sign In</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/auth.css" />
  </head>

  <body class="auth-page">

    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo">Lux<span>Store</span></div>
      <p class="auth-tagline">Your favourite store, always open</p>
    </div>

    <!-- Form Body -->
    <div class="auth-body">
      <h1 class="auth-title">Welcome back 👋</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <div id="login-alert" class="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email"
            required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Your password"
            autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn">
          Sign In
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/login.js"></script>
  </body>

</html>
